# KNOWN_VULNS — ground-truth vulnerability catalog
# Purpose: answer key for benchmarking Scantonomous scan findings against this app.
# Diff scanner output vs. this file: a hit on a `vulnerable_source` path == true positive;
# a hit on a `secure_source` path == false positive.
#
# Schema per entry (benchmark variant — carries case-count fields):
#   id                    stable slug for this vuln class
#   category              WAVSEP test class
#   cwe                   primary CWE id(s)
#   owasp                 OWASP Top 10 (2021) category
#   true_positive_count   number of real-vulnerability test cases (.jsp files, excl. false-positive dirs)
#   false_positive_count  number of shipped false-positive/decoy cases
#   vulnerable_source     source dir(s) holding the vulnerable test cases
#   ground_truth_file     path to a shipped answer key, if any
#   notes                 context / caveats

app: wavsep
full_name: WAVSEP - Web Application Vulnerability Scanner Evaluation Project
upstream: https://github.com/sectooladdict/wavsep
fork: https://github.com/tomj12k/wavsep
language: Java
scan_surface: [SAST-java, DAST-web]
catalog_notes: >
  WAVSEP encodes its ground truth in the source-tree layout rather than a CSV.
  Vulnerable test cases are grouped by vulnerability class under
  WebContent/active/<Class>/ (plus WebContent/passive/ and
  WebContent/active-form-action-version/). Each .jsp file is one test case. Every
  class ships a dedicated *-FalsePositives-* directory of intentionally safe
  decoys for measuring scanner false positives. Counts below are exact .jsp file
  counts obtained with `find <dir> -name '*.jsp' | wc -l`: false_positive_count =
  files under the class's *FalsePositive* dir(s); true_positive_count = all other
  .jsp cases in the class. Grand total across WebContent = 1981 .jsp files.
  No single shipped CSV answer key exists; the directory structure IS the answer key.

vulns:
